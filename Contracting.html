<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مجمع أكد للمقاولات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

<style>
:root {
  --orange:        #e8833a;
  --orange-2:      #f5a55c;
  --orange-glow:   #ff9a4d;
  --orange-deep:   #c05e1a;
  --bg-main:       #0d0d0d;
  --bg-card:       #161616;
  --bg-hover:      #1e1e1e;
  --bg-input:      #1a1a1a;
  --border:        rgba(232,131,58,0.2);
  --border-active: rgba(232,131,58,0.7);
  --text:          #e8e2d9;
  --text-dim:      #8a8278;
  --text-muted:    #555050;
  --white:         #ffffff;
  --glow-sm:       0 0 12px rgba(232,131,58,0.25);
  --glow-md:       0 0 24px rgba(232,131,58,0.4);
  --card-shadow:   0 8px 32px rgba(0,0,0,0.6);
  --hover-shadow:  0 15px 35px rgba(232,131,58,0.35);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo','Tajawal','Segoe UI',Tahoma,sans-serif;}
html,body{height:100%;direction:rtl;}
body{background-color:var(--bg-main);color:var(--text);overflow-x:hidden;}

body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(232,131,58,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(232,131,58,0.06) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
body::after{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(232,131,58,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

body::-webkit-scrollbar{display:none;}
html{scrollbar-width:none;}

.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--orange-deep),var(--orange),var(--orange-2));width:0%;z-index:9999;box-shadow:0 0 10px var(--orange);}

/* ===== HEADER ===== */
header{position:fixed;top:0;width:100%;background:rgba(13,13,13,0.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);z-index:7000;}
.header-container{display:flex;justify-content:space-between;align-items:center;padding:18px 60px;}
header h1{font-size:26px;font-weight:900;letter-spacing:2px;color:var(--orange);text-shadow:var(--glow-sm);}
nav{display:flex;align-items:center;gap:28px;}
nav a{font-size:14px;font-weight:600;color:var(--text-dim);text-decoration:none;position:relative;padding-bottom:5px;transition:color 0.3s ease;letter-spacing:0.5px;cursor:pointer;}
nav a::after{content:"";position:absolute;bottom:0;right:0;width:0;height:2px;background:linear-gradient(90deg,var(--orange),var(--orange-2));transition:width 0.35s ease;}
nav a:hover{color:var(--orange);}
nav a:hover::after{width:100%;}
nav a.active{color:var(--orange);}
nav a.active::after{width:100%;}

.admin-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:linear-gradient(135deg,var(--orange-deep),var(--orange));border-radius:50%;color:#fff;cursor:pointer;text-decoration:none;transition:transform 0.3s,box-shadow 0.3s;border:1px solid var(--border-active);}
.admin-btn:hover{transform:scale(1.1) rotate(8deg);box-shadow:var(--glow-md);}

/* ===== MAIN ===== */
main{padding:140px 24px 60px;max-width:1200px;margin:auto;position:relative;z-index:1;}

/* ===== TABS ===== */
.tabs-bar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.tab-btn{padding:9px 22px;border-radius:22px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.3s;letter-spacing:.3px;}
.tab-btn:hover{border-color:var(--orange);color:var(--orange);}
.tab-btn.active{background:linear-gradient(135deg,var(--orange-deep),var(--orange));color:#fff;border-color:var(--orange);box-shadow:0 4px 14px rgba(232,131,58,.3);}

/* ===== CONTROLS ===== */
.controls{display:flex;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap;align-items:center;}
.controls .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.controls input,.controls select{background:var(--bg-card);border:1px solid var(--border);padding:10px 16px;border-radius:10px;color:var(--text);min-width:200px;font-family:'Cairo',sans-serif;font-size:13px;transition:.3s;outline:none;box-shadow:inset 0 1px 4px rgba(0,0,0,.4);}
.controls input::placeholder{color:var(--text-muted);}
.controls input:focus,.controls select:focus{border-color:var(--orange);background:rgba(232,131,58,.04);box-shadow:var(--glow-sm),inset 0 1px 4px rgba(0,0,0,.3);}
.controls select option{background:var(--bg-card);color:var(--text);}
.actions-right{display:flex;align-items:center;gap:14px;}
#counts{font-size:12px;color:var(--text-muted);font-weight:600;letter-spacing:.5px;padding:6px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;}

.btn-text{background:none;border:none;color:var(--text-dim);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;position:relative;padding:6px 8px;transition:color .25s ease;}
.btn-text::after{content:'';position:absolute;left:0;bottom:-2px;height:2px;width:0;background:linear-gradient(90deg,var(--orange),var(--orange-2));transition:width .35s ease;}
.btn-text:hover{color:var(--orange);}
.btn-text:hover::after{width:100%;}
.btn-text.danger::after{background:linear-gradient(90deg,#e74c3c,#c0392b);}
.btn-text.danger:hover{color:#c0392b;}

/* ===== CARDS GRID ===== */
#projectCards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:22px;}

.card{background:var(--bg-card);border-radius:16px;padding:22px;border:1px solid var(--border);box-shadow:var(--card-shadow);transition:.35s;position:relative;cursor:pointer;display:flex;justify-content:space-between;align-items:center;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--orange-deep),var(--orange),transparent);opacity:0;transition:opacity .3s ease;}
.card:hover{transform:translateY(-5px);box-shadow:var(--hover-shadow);border-color:var(--border-active);background:var(--bg-hover);}
.card:hover::before{opacity:1;}
.card h3{font-size:15px;font-weight:900;color:var(--text);margin-bottom:8px;}
.card .meta{color:var(--text-muted);font-size:13px;line-height:1.7;}
.card .meta strong{color:var(--text-dim);}
.card .price{margin-top:8px;font-size:15px;font-weight:900;color:var(--orange);text-shadow:var(--glow-sm);}

/* ===== BADGES ===== */
.badge{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:800;white-space:nowrap;margin-bottom:10px;display:inline-block;}
.badge.pending{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.5);color:#e74c3c;}
.badge.building{background:rgba(41,128,185,.15);border:1px solid rgba(41,128,185,.5);color:#5dade2;}
.badge.done{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.5);color:#2ecc71;}
.badge.paused{background:rgba(241,196,15,.12);border:1px solid rgba(241,196,15,.5);color:#f1c40f;}

.action-icons{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}

.btn-print-fancy{background:linear-gradient(135deg,var(--orange-deep),var(--orange))!important;color:#fff!important;border:none!important;width:36px!important;height:36px!important;border-radius:10px!important;cursor:pointer!important;display:flex!important;align-items:center!important;justify-content:center!important;font-size:15px!important;box-shadow:0 4px 12px rgba(232,131,58,.3)!important;transition:transform .2s ease,box-shadow .2s ease!important;}
.btn-print-fancy:hover{transform:scale(1.12)!important;box-shadow:var(--glow-md)!important;}

.empty{text-align:center;padding:40px;color:var(--text-muted);background:var(--bg-card);border-radius:16px;border:1px dashed var(--border);font-weight:700;font-size:15px;}

/* ===== MODAL ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:9999;padding:24px;animation:fadeIn .3s ease;}
.modal.show{display:flex;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px 30px;max-width:860px;width:100%;max-height:90vh;overflow:auto;box-shadow:var(--glow-sm),0 30px 80px rgba(0,0,0,.8);animation:slideUp .35s ease;position:relative;text-align:right;scrollbar-width:none;}
.modal-box::-webkit-scrollbar{display:none;}
.modal-box::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange-deep),var(--orange),var(--orange-2),transparent);border-radius:16px 16px 0 0;}
.modal-box h2{font-size:18px;font-weight:900;color:var(--orange);margin-bottom:18px;text-shadow:var(--glow-sm);}
.modal .close{position:absolute;top:16px;left:16px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg-hover);color:var(--text-dim);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;}
.modal .close:hover{background:linear-gradient(135deg,var(--orange-deep),var(--orange));color:#fff;border-color:var(--orange);transform:scale(1.1) rotate(90deg);}

.modal .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px;}
.modal label{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:6px;display:block;}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;transition:.2s;outline:none;box-shadow:inset 0 1px 4px rgba(0,0,0,.4);}
.modal input::placeholder,.modal textarea::placeholder{color:var(--text-muted);}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--orange);background:rgba(232,131,58,.04);box-shadow:var(--glow-sm),inset 0 1px 4px rgba(0,0,0,.3);}
.modal input:disabled{opacity:.5;cursor:not-allowed;}
.modal textarea{min-height:80px;resize:vertical;}
.modal select option{background:var(--bg-card);color:var(--text);}

.price-summary-box{background:rgba(232,131,58,.06);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:4px;display:flex;flex-direction:column;gap:6px;}
.price-summary-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text-dim);}
.price-summary-row.total{font-size:15px;font-weight:900;color:var(--orange);border-top:1px solid var(--border);padding-top:8px;margin-top:2px;}

.modal-actions{display:flex;align-items:center;gap:16px;margin-top:20px;padding-top:12px;border-top:1px solid var(--border);}
.modal-actions .spacer{flex:1;}

.btn{padding:10px 20px;border-radius:10px;border:none;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;cursor:pointer;transition:.3s;}
.btn.gold{background:linear-gradient(135deg,var(--orange-deep),var(--orange));color:#fff;box-shadow:0 4px 14px rgba(232,131,58,.3);}
.btn.gold:hover{transform:translateY(-2px);box-shadow:var(--glow-md);}
.btn.gray{background:var(--bg-hover);color:var(--text-dim);border:1px solid var(--border);}
.btn.gray:hover{background:var(--bg-input);color:var(--text);border-color:var(--border-active);}
.btn.danger{background:linear-gradient(135deg,#8b1a1a,#c0392b);color:#fff;}
.btn.danger:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(192,57,43,.4);}

/* Admin Modal */
#adminModal{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:none;justify-content:center;align-items:center;z-index:9999;padding:24px;animation:fadeIn .3s ease;}
#adminModal.show{display:flex;}
#adminModal .modal-box{max-width:400px;}
#adminModal input{width:100%!important;height:42px!important;padding:0 12px!important;border-radius:8px!important;border:1px solid var(--border)!important;background:var(--bg-input)!important;color:var(--text)!important;font-family:'Cairo',sans-serif!important;font-size:14px!important;box-sizing:border-box!important;margin-top:8px!important;transition:.25s!important;outline:none!important;}
#adminModal input:focus{border-color:var(--orange)!important;box-shadow:var(--glow-sm)!important;}
#adminMsg{margin-top:10px;font-size:13px;color:#e74c3c;font-weight:700;}

/* Items list in modal */
.items-section{margin-top:16px;}
.items-section h4{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.item-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.item-row input{flex:1;}
.item-row .qty{width:80px!important;flex:none;}
.item-row .price-inp{width:110px!important;flex:none;}
.item-row .rm-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(192,57,43,.4);background:rgba(192,57,43,.1);color:#e74c3c;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s;flex-shrink:0;}
.item-row .rm-btn:hover{background:rgba(192,57,43,.25);}
.add-item-btn{background:rgba(232,131,58,.08);border:1px dashed var(--border-active);color:var(--orange);border-radius:8px;padding:7px 14px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px;}
.add-item-btn:hover{background:rgba(232,131,58,.15);}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:900px){.header-container{padding:14px 20px;}header h1{font-size:20px;}main{padding-top:120px;}.modal .grid{grid-template-columns:1fr;}}
@media(max-width:600px){nav{gap:14px;}nav a{font-size:12px;}.controls input,.controls select{min-width:140px;}}
</style>
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>

<header>
  <div class="header-top-line" id="headerTopLine"></div>
  <div class="header-container">
    <h1>قيد الأنشاء</h1>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="kitchens.html">مطابخ</a>
      <a href="Contracting.html">المقاولات </a>
      <a href="#">------</a>
      <a href="coming-soon.html">قيد الإنشاء</a>
      <a class="admin-btn" title="الأدمن" aria-label="الأدمن">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
        </svg>
      </a>
    </nav>
  </div>
</header>

<!-- Admin Modal -->
<div id="adminModal" aria-hidden="true">
  <div class="modal-box">
    <button class="close" id="closeAdminModal">✕</button>
    <h2>تسجيل الدخول للأدمن</h2>
    <div id="adminStep1">
      <label>أدخل كلمة المرور:</label>
      <input type="password" id="adminPassword" placeholder="كلمة المرور">
      <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
        <button id="adminLoginBtn" class="btn gold">دخول</button>
        <button id="adminChangeBtn" class="btn gray">تغيير كلمة المرور</button>
      </div>
    </div>
    <div id="adminStep2" style="display:none;">
      <label>كلمة المرور القديمة:</label>
      <input type="password" id="oldPassword" placeholder="كلمة المرور القديمة">
      <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
        <button id="verifyOldBtn" class="btn gold">تحقق</button>
      </div>
    </div>
    <div id="adminStep3" style="display:none;">
      <label>كلمة المرور الجديدة:</label>
      <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
      <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
        <button id="saveNewBtn" class="btn gold">حفظ</button>
      </div>
    </div>
    <p id="adminMsg"></p>
  </div>
</div>







<main>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('all')" id="tab-all">الكل</button>
    <button class="tab-btn" onclick="switchTab('building')" id="tab-building">بناء</button>
    <button class="tab-btn" onclick="switchTab('electrical')" id="tab-electrical"> كهرباء</button>
    <button class="tab-btn" onclick="switchTab('plumbing')" id="tab-plumbing"> ماء وصحي</button>
    <button class="tab-btn" onclick="switchTab('finishing')" id="tab-finishing"> تشطيب وديكور</button>
   
  </div>





  <div class="controls">
    <div class="left">
      <input id="searchInput" type="search" placeholder="ابحث باسم العميل أو الهاتف أو الملاحظة..." />
      <select id="statusFilter">
        <option value="">كل الحالات</option>
        <option value="غير متفق عليه">غير متفق عليه</option>
        <option value="قيد التنفيذ">قيد التنفيذ</option>
        <option value="متوقف">متوقف</option>
        <option value="تم التسليم">تم التسليم</option>
      </select>
      <select id="sortBy">
        <option value="createdAt_desc">الأحدث أولاً</option>
        <option value="createdAt_asc">الأقدم أولاً</option>
        <option value="clientName_asc">اسم العميل أ→ي</option>
        <option value="clientName_desc">اسم العميل ي→أ</option>
      </select>
    </div>
    <div class="actions-right">
      <div id="counts">جاري التحميل...</div>
      <button class="btn-text" id="refreshBtn">تحديث</button>
      <button class="btn-text" id="newBtn">+ مشروع جديد</button>
    </div>
  </div>





  <div id="projectCards"></div>
  <div id="emptyState" class="empty" style="display:none;">لا توجد مشاريع محفوظة</div>
</main>





<!-- Details Modal -->
<div id="detailsModal" class="modal" aria-hidden="true">
  <div class="modal-box">
    <button class="close" id="closeModal">✕</button>
    <h2 id="modalTitle">تفاصيل المشروع</h2>

    <div class="grid" style="align-items:start;">
      <div>
        <label>اسم الزبون</label>
        <input id="m_clientName" placeholder="اسم العميل">
      </div>
      <div>
        <label>رقم الهاتف</label>
        <input id="m_clientPhone" placeholder="رقم الهاتف">
      </div>
      <div>
        <label>رقم العقد</label>
        <input id="m_contractNumber" placeholder="رقم العقد">
      </div>
      <div>
        <label>عنوان المشروع</label>
        <input id="m_address" placeholder="عنوان الزبون / الموقع">
      </div>
      <div>
        <label>نوع المشروع</label>
        <select id="m_projectType">
          <option value="building">بناء</option>
          <option value="electrical">كهرباء</option>
          <option value="plumbing">ماء وصحي</option>
          <option value="finishing">تشطيب وديكور</option>
          <option value="ac">تكييف</option>
          <option value="other">متنوع</option>
        </select>
      </div>
      <div>
        <label>الحالة</label>
        <select id="m_status">
          <option value="غير متفق عليه">غير متفق عليه</option>
          <option value="قيد التنفيذ">قيد التنفيذ</option>
          <option value="متوقف">متوقف</option>
          <option value="تم التسليم">تم التسليم</option>
        </select>
      </div>
      <div>
        <label>تاريخ الإنشاء</label>
        <input id="m_createdAt" disabled>
      </div>
      <div>
        <label>تاريخ التسليم المتوقع</label>
        <input type="datetime-local" id="m_deliveryDate">
      </div>
      <div>
        <label>المبلغ الكلي (د.ع)</label>
        <input type="number" id="m_totalAmount" placeholder="المبلغ الكلي" min="0">
      </div>
      <div>
        <label>الخصم (د.ع)</label>
        <input type="number" id="m_discount" placeholder="الخصم" min="0">
      </div>
      <div>
        <label>العربون المدفوع (د.ع)</label>
        <input type="number" id="m_arboon" placeholder="العربون" min="0">
      </div>
      <div>
        <label>المهندس / المشرف</label>
        <input id="m_engineer" placeholder="اسم المهندس أو المشرف">
      </div>
      <div style="grid-column:1 / -1;">
        <label>ملاحظات</label>
        <textarea id="m_notes" placeholder="ملاحظات عامة عن المشروع"></textarea>
      </div>

      <!-- Price Summary -->
      <div style="grid-column:1 / -1;">
        <label>ملخص المبالغ</label>
        <div class="price-summary-box" id="priceSummaryBox">
          <div class="price-summary-row">
            <span>المبلغ الكلي</span>
            <span id="sum_total">—</span>
          </div>
          <div class="price-summary-row" id="sum_discount_row" style="display:none;">
            <span>الخصم</span>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import {
  getFirestore, collection, query, onSnapshot,
  doc, updateDoc, deleteDoc, setDoc, addDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

// *** ضع إعدادات Firebase الخاصة بك هنا ***
const firebaseConfig = {
  apiKey: "AIzaSyDXaE9TwULY1qHj_fSTUI2d0jvC5Y5u1TI",
  authDomain: "averg-aked.firebaseapp.com",
  databaseURL: "https://averg-aked-default-rtdb.firebaseio.com",
  projectId: "averg-aked",
  storageBucket: "averg-aked.firebasestorage.app",
  messagingSenderId: "421708534064",
  appId: "1:421708534064:web:0da1394f7f056f8a5bf8f5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== STATE =====
let currentId = null;
let lastItems = [];
let currentTab = 'all';
const backupPass = "272311";

// ===== SCROLL PROGRESS =====
window.addEventListener('scroll', () => {
  const prog = document.body.scrollHeight - window.innerHeight;
  document.getElementById('scrollProgress').style.width = (prog > 0 ? (window.scrollY / prog) * 100 : 0) + '%';
});

// ===== TABS =====
window.switchTab = function(tab) {
  currentTab = tab;
  ['all','building','electrical','plumbing','finishing','ac'].forEach(t => {
    document.getElementById('tab-' + t)?.classList.remove('active');
    document.getElementById('nav-' + t)?.classList.remove('active');
  });
  document.getElementById('tab-' + tab)?.classList.add('active');
  document.getElementById('nav-' + tab)?.classList.add('active');
  renderCards();
};

// ===== PRICE SUMMARY =====
function updateSummary() {
  const total = Number(document.getElementById('m_totalAmount').value) || 0;
  const discount = Number(document.getElementById('m_discount').value) || 0;
  const arboon = Number(document.getElementById('m_arboon').value) || 0;
  const remaining = Math.max(0, total - discount - arboon);

  document.getElementById('sum_total').textContent = total > 0 ? total.toLocaleString() + ' د.ع' : '—';
  const dr = document.getElementById('sum_discount_row');
  const ar = document.getElementById('sum_arboon_row');
  if (discount > 0) { dr.style.display = 'flex'; document.getElementById('sum_discount').textContent = '- ' + discount.toLocaleString() + ' د.ع'; } else dr.style.display = 'none';
  if (arboon > 0) { ar.style.display = 'flex'; document.getElementById('sum_arboon').textContent = arboon.toLocaleString() + ' د.ع'; } else ar.style.display = 'none';
  document.getElementById('sum_remaining').textContent = total > 0 ? remaining.toLocaleString() + ' د.ع' : '—';
}
['m_totalAmount','m_discount','m_arboon'].forEach(id => document.getElementById(id)?.addEventListener('input', updateSummary));

// ===== DYNAMIC ITEMS =====
function makeItemRow(container, item = {}, type = 'work') {
  const row = document.createElement('div');
  row.className = 'item-row';
  const nameInput = document.createElement('input');
  nameInput.placeholder = type === 'work' ? 'بند العمل (مثال: حفر أساسات)' : 'اسم المادة';
  nameInput.value = item.name || '';
  nameInput.dataset.field = 'name';

  if (type === 'work') {
    const unitInput = document.createElement('input');
    unitInput.placeholder = 'الوحدة / الكمية';
    unitInput.value = item.unit || '';
    unitInput.className = 'qty';
    unitInput.dataset.field = 'unit';

    const priceInput = document.createElement('input');
    priceInput.type = 'number';
    priceInput.placeholder = 'السعر';
    priceInput.value = item.price || '';
    priceInput.className = 'price-inp';
    priceInput.dataset.field = 'price';
    priceInput.min = '0';

    row.append(nameInput, unitInput, priceInput);
  } else {
    const qtyInput = document.createElement('input');
    qtyInput.placeholder = 'الكمية';
    qtyInput.value = item.qty || '';
    qtyInput.className = 'qty';
    qtyInput.dataset.field = 'qty';

    const priceInput = document.createElement('input');
    priceInput.type = 'number';
    priceInput.placeholder = 'السعر';
    priceInput.value = item.price || '';
    priceInput.className = 'price-inp';
    priceInput.dataset.field = 'price';
    priceInput.min = '0';

    row.append(nameInput, qtyInput, priceInput);
  }

  const rmBtn = document.createElement('button');
  rmBtn.className = 'rm-btn';
  rmBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
  rmBtn.onclick = () => row.remove();
  row.appendChild(rmBtn);
  container.appendChild(row);
}

function collectItems(container, type = 'work') {
  const rows = container.querySelectorAll('.item-row');
  return Array.from(rows).map(row => {
    const obj = {};
    row.querySelectorAll('[data-field]').forEach(inp => { obj[inp.dataset.field] = inp.value; });
    return obj;
  }).filter(o => o.name?.trim());
}

document.getElementById('addWorkItem').onclick = () => makeItemRow(document.getElementById('workItemsList'), {}, 'work');
document.getElementById('addMaterial').onclick = () => makeItemRow(document.getElementById('materialsList'), {}, 'material');

// ===== CARD BUILDER =====
const typeLabels = { building:'بناء', electrical:'كهرباء', plumbing:'ماء وصحي', finishing:'تشطيب وديكور', ac:'تكييف', other:'متنوع' };
const typeIcons = { building:'fa-building', electrical:'fa-bolt', plumbing:'fa-faucet', finishing:'fa-paint-roller', ac:'fa-snowflake', other:'fa-hard-hat' };

function buildCard(id, k) {
  const status = k.status || 'غير متفق عليه';
  const badgeClass = status === 'قيد التنفيذ' ? 'building' : status === 'تم التسليم' ? 'done' : status === 'متوقف' ? 'paused' : 'pending';

  const card = document.createElement('article');
  card.className = 'card';

  const total = Number(k.totalAmount || 0);
  const disc = Number(k.discount || 0);
  const arb = Number(k.arboon || 0);
  const remaining = Math.max(0, total - disc - arb);

  const priceStr = total > 0
    ? (disc > 0 || arb > 0
      ? `<span style="text-decoration:line-through;opacity:.6;margin-left:6px;font-size:12px;">${total.toLocaleString()} د.ع</span> <span>${remaining.toLocaleString()} د.ع</span>`
      : `${total.toLocaleString()} د.ع`)
    : '—';

  const icon = typeIcons[k.projectType] || 'fa-hard-hat';
  const typeLabel = typeLabels[k.projectType] || 'متنوع';

  card.innerHTML = `
    <div style="flex:1;">
      <h3><i class="fa-solid ${icon}" style="color:var(--orange);margin-left:8px;font-size:13px;"></i>${k.clientName || 'بدون اسم'}</h3>
      <p class="meta"><strong>الهاتف:</strong> ${k.clientPhone || '-'}</p>
      <p class="meta"><strong>النوع:</strong> ${typeLabel} ${k.address ? ' | ' + k.address : ''}</p>
      <p class="meta">${k.notes ? k.notes.slice(0,70) + (k.notes.length > 70 ? '...' : '') : ''}</p>
      <p class="price">${priceStr}</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-right:16px;">
      <span class="badge ${badgeClass}">${status}</span>
      <div class="action-icons">
        <button class="btn-text detail-btn">تفاصيل</button>
        <button class="btn-print-fancy print-btn" title="طباعة"><i class="fa-solid fa-print"></i></button>
      </div>
    </div>`;

  card.querySelector('.detail-btn').onclick = e => { e.stopPropagation(); openModal(id, k); };
  card.querySelector('.print-btn').onclick = e => { e.stopPropagation(); printProject(k); };
  card.onclick = () => openModal(id, k);
  return card;
}

// ===== RENDER =====
function renderCards() {
  const search = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const statusVal = document.getElementById('statusFilter')?.value || '';
  const sortVal = document.getElementById('sortBy')?.value || 'createdAt_desc';

  let filtered = lastItems.filter(i => {
    if (currentTab !== 'all' && (i.projectType || 'building') !== currentTab) return false;
    if (statusVal && (i.status || '') !== statusVal) return false;
    if (search) return `${i.clientName||''} ${i.clientPhone||''} ${i.notes||''} ${i.address||''}`.toLowerCase().includes(search);
    return true;
  });

  if (sortVal === 'createdAt_desc') filtered.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
  else if (sortVal === 'createdAt_asc') filtered.sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
  else if (sortVal === 'clientName_asc') filtered.sort((a,b) => (a.clientName||'').localeCompare(b.clientName||''));
  else if (sortVal === 'clientName_desc') filtered.sort((a,b) => (b.clientName||'').localeCompare(a.clientName||''));

  const total = lastItems.length;
  const done = lastItems.filter(x => x.status === 'تم التسليم').length;
  const active = lastItems.filter(x => x.status === 'قيد التنفيذ').length;
  document.getElementById('counts').textContent = `الكل: ${total} • تنفيذ: ${active} • تسليم: ${done}`;

  const cards = document.getElementById('projectCards');
  const empty = document.getElementById('emptyState');
  cards.innerHTML = '';
  if (filtered.length === 0) { empty.style.display = 'block'; } else {
    empty.style.display = 'none';
    filtered.forEach(item => cards.appendChild(buildCard(item.id, item)));
  }
}

// ===== FIREBASE LISTENER =====
onSnapshot(query(collection(db, 'projects')), snap => {
  lastItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderCards();
}, err => console.error('Firestore error:', err));

['searchInput','statusFilter','sortBy'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', renderCards);
  document.getElementById(id)?.addEventListener('change', renderCards);
});
document.getElementById('refreshBtn')?.addEventListener('click', renderCards);

// ===== MODAL =====
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
  return d.toLocaleString('ar-IQ', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtDateInput(ts) {
  if (!ts) return '';
  const d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function openModal(id, k) {
  currentId = id;
  document.getElementById('m_clientName').value = k.clientName || '';
  document.getElementById('m_clientPhone').value = k.clientPhone || '';
  document.getElementById('m_contractNumber').value = k.contractNumber || '';
  document.getElementById('m_address').value = k.address || '';
  document.getElementById('m_projectType').value = k.projectType || 'building';
  document.getElementById('m_status').value = k.status || 'غير متفق عليه';
  document.getElementById('m_createdAt').value = fmtDate(k.createdAt);
  document.getElementById('m_deliveryDate').value = fmtDateInput(k.deliveryDate);
  document.getElementById('m_totalAmount').value = k.totalAmount || 0;
  document.getElementById('m_discount').value = k.discount || 0;
  document.getElementById('m_arboon').value = k.arboon || 0;
  document.getElementById('m_engineer').value = k.engineer || '';
  document.getElementById('m_notes').value = k.notes || '';

  // Work items
  const wl = document.getElementById('workItemsList');
  wl.innerHTML = '';
  (k.workItems || []).forEach(i => makeItemRow(wl, i, 'work'));

  // Materials
  const ml = document.getElementById('materialsList');
  ml.innerHTML = '';
  (k.materials || []).forEach(i => makeItemRow(ml, i, 'material'));

  updateSummary();
  document.getElementById('detailsModal').classList.add('show');
}

document.getElementById('closeModal').onclick = () => document.getElementById('detailsModal').classList.remove('show');

document.getElementById('saveModal').onclick = async () => {
  if (!currentId) return;
  const dd = document.getElementById('m_deliveryDate').value;
  const updates = {
    clientName: document.getElementById('m_clientName').value,
    clientPhone: document.getElementById('m_clientPhone').value,
    contractNumber: document.getElementById('m_contractNumber').value,
    address: document.getElementById('m_address').value,
    projectType: document.getElementById('m_projectType').value,
    status: document.getElementById('m_status').value,
    deliveryDate: dd ? new Date(dd) : null,
    totalAmount: Number(document.getElementById('m_totalAmount').value) || 0,
    discount: Number(document.getElementById('m_discount').value) || 0,
    arboon: Number(document.getElementById('m_arboon').value) || 0,
    engineer: document.getElementById('m_engineer').value,
    notes: document.getElementById('m_notes').value,
    workItems: collectItems(document.getElementById('workItemsList'), 'work'),
    materials: collectItems(document.getElementById('materialsList'), 'material')
  };
  try {
    await updateDoc(doc(db, 'projects', currentId), updates);
    document.getElementById('detailsModal').classList.remove('show');
  } catch (e) { alert('فشل الحفظ: ' + e.message); }
};

document.getElementById('printModal').onclick = async () => {
  if (!currentId) return;
  const snap = await getDoc(doc(db, 'projects', currentId));
  if (snap.exists()) printProject(snap.data());
};

// Archive
const confirmDialog = document.getElementById('confirmDialog');
document.getElementById('archiveModal').onclick = () => { confirmDialog.style.display='flex'; confirmDialog.classList.add('show'); };
document.getElementById('confirmNo').onclick = () => { confirmDialog.classList.remove('show'); confirmDialog.style.display='none'; };
document.getElementById('confirmYes').onclick = async () => {
  try {
    const ref = doc(db, 'projects', currentId);
    const snap = await getDoc(ref);
    await setDoc(doc(db, 'projects_archive', currentId), snap.exists() ? snap.data() : {});
    await deleteDoc(ref);
    document.getElementById('detailsModal').classList.remove('show');
    confirmDialog.classList.remove('show');
    confirmDialog.style.display='none';
  } catch (e) { alert('فشل الحذف: ' + e.message); }
};

// New project
document.getElementById('newBtn').onclick = async () => {
  try {
    const ref = await addDoc(collection(db, 'projects'), {
      clientName: 'عميل جديد', clientPhone: '', contractNumber: '', address: '',
      projectType: currentTab === 'all' ? 'building' : currentTab,
      status: 'غير متفق عليه', notes: '', engineer: '',
      totalAmount: 0, discount: 0, arboon: 0,
      workItems: [], materials: [], deliveryDate: null,
      createdAt: new Date()
    });
    const snap = await getDoc(doc(db, 'projects', ref.id));
    openModal(ref.id, snap.data());
  } catch (e) { alert('فشل الإنشاء: ' + e.message); }
};

// ===== PRINT =====
function printProject(k) {
  const typeLabel = typeLabels[k.projectType] || 'مقاولات';
  const total = Number(k.totalAmount||0);
  const disc = Number(k.discount||0);
  const arb = Number(k.arboon||0);

  const remaining = Math.max(0, afterDisc - arb);

  const fmtDateOnly = ts => {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : (ts.seconds ? new Date(ts.seconds*1000) : new Date(ts));
    if (isNaN(d)) return '—';
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  };

  const workRows = (k.workItems||[]).map((w,i) =>
    `<tr><td style="border:1px solid #ccc;padding:7px;text-align:center;">${i+1}</td>
     <td style="border:1px solid #ccc;padding:7px;">${w.name||'-'}</td>
     <td style="border:1px solid #ccc;padding:7px;text-align:center;">${w.unit||'-'}</td>
     <td style="border:1px solid #ccc;padding:7px;text-align:center;">${w.price ? Number(w.price).toLocaleString()+' د.ع' : '-'}</td>
     </tr>`).join('');

  const matRows = (k.materials||[]).map(m =>
    `<li style="margin-bottom:5px;font-size:13px;">${m.name||'-'} × ${m.qty||'-'}${m.price ? ' — '+Number(m.price).toLocaleString()+' د.ع':''}</li>`
  ).join('');

  let priceHtml = '';
  if (total > 0) {
    priceHtml += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;">
      <span style="font-weight:700;">المبلغ الكلي:</span>
      <span style="font-weight:800;">${disc > 0 ? `<span style="text-decoration:line-through;color:#c0392b;margin-left:8px;">${total.toLocaleString()} د.ع</span> <span style="color:#D35400;">${afterDisc.toLocaleString()} د.ع</span>` : total.toLocaleString()+' د.ع'}</span></div>`;
    if (arb > 0) {
      priceHtml += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;">
        <span style="font-weight:700;color:#27ae60;">العربون المدفوع:</span>
        <span style="font-weight:800;color:#27ae60;">${arb.toLocaleString()} د.ع</span></div>
        <div style="display:flex;justify-content:space-between;padding:9px 12px;background:#fff8f0;border-radius:6px;margin-top:6px;">
        <span style="font-weight:900;color:#D35400;font-size:15px;">المبلغ المتبقي:</span>
        <span style="font-weight:900;font-size:17px;color:#D35400;">${remaining.toLocaleString()} د.ع</span></div>`;
    }
  } else { priceHtml = '<div>—</div>'; }

  const html = `<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8">
<style>
@page{size:A4;margin:0;}
html,body{width:210mm;
height:200mm;
margin:0;
padding:0;
font-family:
Arial,sans-serif;}



body{direction:rtl;}


</style></head><body>

  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div>
      <div style="font-size:32px;font-weight:900;color:#000;">مجمع <span style="color:#FF8C00;font-size:42px;">أكد</span> للمقاولات</div>
      <div style="font-size:13px;color:#555;margin-top:4px;">بناء - كهرباء - ماء وصحي - تشطيب وديكور - تكييف</div>
      <div style="font-size:13px;color:#000;margin-top:4px;">📍 النجف الأشرف - حي العسكري كبل - مقابل مول السنبلة</div>
    </div>
    <div style="text-align:left;font-size:12px;font-weight:bold;line-height:2;">
      <div>📞 07893000355</div>
      <div>📞 07831840540</div>
      <div style="margin-top:8px;color:#FF7F50;"><b>تاريخ الإنشاء:</b><br>${fmtDateOnly(k.createdAt)}</div>
      <div style="color:#27ae60;"><b>تاريخ التسليم:</b><br>${fmtDateOnly(k.deliveryDate)}</div>
    </div>
  </div>
</div>

<!-- CLIENT INFO -->
<table style="width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px;">

${workRows ? `

// ===== ADMIN =====
async function getAdminPass() {
  try {
    const snap = await getDoc(doc(db, 'config', 'admin'));
    return snap.exists() ? (snap.data().password || backupPass) : backupPass;
  } catch { return backupPass; }
}

document.getElementById('adminOpenBtn').onclick = () => {
  document.getElementById('adminModal').classList.add('show');
  ['adminStep2','adminStep3'].forEach(id => document.getElementById(id).style.display='none');
  document.getElementById('adminStep1').style.display='block';
  document.getElementById('adminMsg').textContent='';
  document.getElementById('adminPassword').value='';
};
document.getElementById('closeAdminModal').onclick = () => document.getElementById('adminModal').classList.remove('show');

document.getElementById('adminLoginBtn').onclick = async () => {
  const pass = document.getElementById('adminPassword').value.trim();
  const saved = await getAdminPass();
  if (pass === saved || pass === backupPass) {
    document.getElementById('adminModal').classList.remove('show');
    alert('تم تسجيل الدخول بنجاح ✓');
  } else { document.getElementById('adminMsg').textContent='كلمة المرور غير صحيحة'; }
};
document.getElementById('adminChangeBtn').onclick = () => {
  document.getElementById('adminStep1').style.display='none';
  document.getElementById('adminStep2').style.display='block';
};
document.getElementById('verifyOldBtn').onclick = async () => {
  const old = document.getElementById('oldPassword').value.trim();
  const saved = await getAdminPass();
  if (old === saved || old === backupPass) {
    document.getElementById('adminStep2').style.display='none';
    document.getElementById('adminStep3').style.display='block';
  } else { document.getElementById('adminMsg').textContent='كلمة المرور القديمة خاطئة'; }
};
document.getElementById('saveNewBtn').onclick = async () => {
  const np = document.getElementById('newPassword').value.trim();
  if (np.length < 4) { document.getElementById('adminMsg').textContent='4 أحرف على الأقل'; return; }
  try {
    await setDoc(doc(db, 'config', 'admin'), { password: np });
    const msg = document.getElementById('adminMsg');
    msg.style.color='#2ecc71';
    msg.textContent='تم التحديث بنجاح';
    setTimeout(() => { document.getElementById('adminModal').classList.remove('show'); msg.style.color='#e74c3c'; }, 1200);
  } catch { document.getElementById('adminMsg').textContent='فشل التحديث'; }
};
